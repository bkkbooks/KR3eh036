body:
  text: 虛勞總論虛勞之症無外邪相干皆由內傷臟腑所致如酒傷肺濕熱熏蒸則肺陰消爍色傷腎精室空虛則相火無制思慮傷神神傷血耗則心火易炎勞倦傷脾最能生熱熱則內伐真陰怒氣傷肝鬱怒則肝火內熾而灼血大怒則肝火上衝而吐血此五者皆能勞其精血道經云涕唾精津汗血液七般靈物總屬陰陰虛則內熱生而成虛勞之症大約酒色成勞者多然有童子亦患此者則由於先天稟受之不足而稟於母氣者尤多其師尼寡婦室女思欲不遂氣血鬱結以致寒熱如瘧朝涼暮熱飲食不思經期不準或閉絶不行成此病者甚多多由鬱火所蒸而致方書之言虛勞皆言氣虛血虛陽虛陰虛混同立治是以學者漫無指歸不知氣虛者面目無神語言輕微四肢無力脈來微弱陽虛者體冷畏寒手足逆冷溺清溏泄脈沉小遲可投溫補故謂虛勞之可服參耆受補者為可治氣虛陽虛之症也虛勞之不能服參耆不受補者為不可治血虛陰虛之症也雖血脫有補氣之法此指卒暴失血素非血虛之人如新産症之類皆非所論於血因火燥致虛之症夫火之所以燥者水虛無以制之也故經曰一水不能勝五火五火者五志之火也一水者腎中真陰之水即精也人生全盛之數前後止二十餘年耳故丹溪引日月之盈虧以為陽常有餘陰常不足王節齊亦以為陰虛成病十之八九陽虛成病百無一二蓋以節欲少縱欲者多耳夫人但知縱欲勞精孰知陰精日損飲食無味轉勞轉虛脈從內變色不外華其為病也在腎則為腰脊腿脛痠軟或攸隱而痛為骨蒸內熱盜汗或至夜發熱為遍身骨疼或疼痛如折為夢遺滑泄為耳中鳴足心熱在心則為驚悸怔忡為掌中乾熱為虛煩無寐為魘夢不寧為口苦舌乾為口舌糜爛在肺則為咳嗽多痰或乾咳少痰為胸滿氣逆或喘或促為兩顴紅若脂為鼻中氣如火為咳血衄血甚則吐白沫一邊不能睡咽痛喉爛聲嘶音啞在肝則為寒熱如瘧為頸項瘰癧為脅肋作脹作疼為兩目或澀或痛為頭暈眼花為多怒為吐血在脾則為飲食少思噁心嘔吐為脹滿腹痛食不消化為腸鳴泄瀉肌肉消瘦皆五臟虛勞之本症經云治病求其本須審其因何致損何臟受傷如因於色者則知其傷在腎縱有他經現症亦當以補腎為主而兼治他經之症其因於酒者又當以清肺為先標本既審而病之傳變尤宜熟察如腎傳心心傳肺五臟相傳必侮而乘之謂之賊克大凶之兆經云諸病以次傳者死謂五臟克遍也難經云七傳者死諸病始於腎而脾又傳腎謂六經已盡一臟不可再傷也如腎病不傳心而傳肺此間一臟以子病及母也如不傳心肺而傳肝此間二臟以母病及子也如不傳心肺肝而傳脾此間三臟而傳於己之所不勝所謂輕而侮之也傳乘不明豈能治病世醫不知陰虛者多將氣血陰陽模糊調治豈不誤哉試言之其誤有七一引火歸元之誤命門之龍火謂之真陽如果衰弱腎中陰盛龍火不能安其位浮越於上而為上焦假熱面赤煩躁口渴甚則舌苔但口雖渴而不欲飲水苔雖有而舌必滑軟小便清長足冷過膝其右尺必沉小而遲或浮大無根此陰盛於下逼陽於上之假症如夏至一陰生水底冷而天上熱也正宜八味之屬引之歸元如冬至一陽生而地中水暖龍歸大海也至若虛勞症是因腎水真陰虛熱水不攝火火因上炎而致面赤唇紅口鼻出血齒痛齒浮齒衄種種上焦虛熱之症雖亦龍火上炎與浮陽上泛不同縱有下部惡寒足冷此因虛火上升所致非真陽衰而然故小便必黃赤脈必帶數有內熱的症之可據誤用桂附引火歸元之法是抱薪救火上焦愈熱而咳嗽燥渴咽痛喉爛諸症至矣二理中溫補之誤如果虛寒腹痛綿綿痛無增減喜熱手按熱飲食虛寒泄瀉水穀不化而澄徹清冷必有虛寒之脈症可憑然後用之有效今人一見脹滿腹痛食不消化腸鳴泄瀉等症便認為虛寒而投以白朮之香燥又濟以乾薑之辛熱不知虛勞之症患在傷陰再補其陽則陽益亢而陰益竭是促之也更有見其脹滿泄瀉遂引經文清氣在下則生飧泄濁氣在上則生䐜脹而用補中益氣以升清降濁誤施升柴反促陰火上逆以致咳嗽增吐衄至而危亡見矣三參耆助火之誤夫肺脈按之虛而不數肺中不熱參耆可受故有土旺生金弗拘保肺之說而今火已爍金而咳矣火蒸津液而化為濃痰矣君相亢甚而血隨上逆矣猶引無陽則陰無以生虛火可補參耆之屬富貴之家大劑投之因之陽火愈亢而金益傷矣四苦寒瀉火之誤實火為病可以苦寒直折之然須熱去即止不可過用虛火陰虧豈知柏苦寒之劑所可清非惟不能清火熱抑且有損真陰徒敗胃氣食少泄多將何療治甚者見其大便燥結則用硝黃以通之不知腎主二便更主精液腎之精液即竭自然不能濡潤滋其陰潤其燥而便自通彼既虛之陰豈能勝硝黃之攻擊乎故士材之論人徒從其溫補豈知其深戒苦寒之不可妄用也五二陳消痰之誤脾痰為濕痰滑而易出或稀如飲水濕者燥之半夏為正治之藥若陰水不足陰火上升肺受火侮不得清肅下行由是津液凝濁不生血而生痰此當以潤劑滋其陰使上逆之火得返其宅而痰自清矣二陳豈可輕用哉六辛劑發散之誤世之真陰虛而發熱者十之六七亦與外感無異火逆衝上則頭脹微痛火升壅肺則有鼻塞陰虛陽陷入里則灑淅惡寒陰虛陽無所附則浮越肌表發熱但其發時必在午後先灑淅惡寒少頃發熱熱至雞鳴寅卯時盜汗出而身涼或不微寒而但午後發熱必現前列腎虛諸症或兼唇紅顴赤口渴煩躁六脈弦數或虛數無力此宜大劑補陰如保陰六味之屬若認為外感而用風藥以表散之則魄汗淋漓諸虛蜂起或有失血之人表之無汗所謂奪血者無汗也若強發之血必從口鼻中出為下厥上竭之症難治矣今人一見發熱便用表散更以為邪尚未清禁其飲食以致胃氣餒敗至於不起能不為之寒心哉七治療過時之誤上古治未病如勞神者常養其心勞倦者常補其脾多怒者常滋其肝血多飲者常清其肺熱好色者峻補其腎水及病之方萌即為補救今人以內熱之症而忽之虛症漸見猶不求治自恃飲食如常毫不加意逮至病日深而後求治亦已晚矣蓋治之甚難有三大要焉一曰補腎水夫腎主水受五臟六腑之精而藏之故五液皆歸於精而五精皆統於腎腎有精室是即命門精藏於此氣化於此精即陰中之水也氣即陰中之水火也故命門之水火為十二臟之化源然火不患其衰水則患其少王節齊云少年腎水正旺似不必補然施泄太過豈能充滿中年欲心雖減然少年斫喪太多豈能復實及至老年天真漸絶只有孤陽凡人自少至老所生疾病大半由於真陰不足即童子稟賦弱者幼即填補亦有可復之天所以補陰之藥人生一日不可缺況虛勞之因入房太甚而得者乎故保陰六味左歸之屬皆甘寒滋水添精之品補陰以配陽正所謂壯水之主以制陽光也滋其陰則火自降譬之殘燈火焰添油則焰光自小也然須制大劑長久服之蓋益陰之藥必無旦夕之效以陰無速補之法也若因於酒者清金潤榮為主而保陰之屬仍不可廢何則好飲之人仍有不患虛勞者以腎水不虛也虛則心寡於畏而復灼久傷之肺焉得不病補北方所以瀉南方也因於思慮者清心養血為主而保陰之屬仍不可廢所謂水壯而火熄弗急急於瀉心是也因於勞倦者培補脾陰為主而佐以保陰之劑經云有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎故知勞倦傷脾內熱者必及於腎也若忿怒傷肝動血保陰六味為正治之品蓋水旺則龍火不炎而雷火亦不炎乃腎肝同治之法也二曰培脾土脾胃為後天之本經云安穀則昌蓋飲食多自能化精生血雖有邪熱藥得治之久則火自降而陰自復若脾胃一損則血不生而陰不足以配陽故越人歸重脾胃而言一損損於肺皮聚毛落二損損於心血脈不能榮養臟腑三損損於脾飲食不為肌膚四損損於肝筋緩不能自收持五損損於腎骨痿不能起於床從上而下者過於胃則不治至骨痿不能起於床者死從下而上者過於脾則不治至皮聚毛落者死所以仲景治虛勞惟用甘藥建立中氣以生血化精為復虛勞之良法又精不足者補之以味味旨味非獨藥也五穀之味皆味也補以味而節其勞則漸有餘矣經云陰陽形氣俱不足者調以甘藥蓋脾胃之強弱動關五臟況土強則金旺金旺則水充又男子以脾胃為生身之本女子以心脾為立命之根故治虛勞者無論何臟致損皆當以調脾胃為主三曰慎調攝虛勞之因於酒色者固多其因於憂思鬱怒者亦不少如僧尼寡婦童男室女及不得意之人必須消遣情懷善於自解非全仗草木之力也今人患此者徒恃藥力不知屏欲間者有知戒酒色而不知節勞逸能節勞逸而於七情多所難釋不知心有妄動氣隨心散氣散不聚精隨氣亡故廣成子曰必靜必清毋勞爾形無搖爾精乃可長生斯言可謂虛勞調攝之良法也今觀世人之患之者多而保之者少以病者治之不早醫者治之不善也故特發明陰虛成病之因次及方書之混列更推其真陰易虛之故以及標本傳乘並治之誤而終之以治要其指歸如是非敢矯當世之偏實本諸先哲及先世之發明餘生平之經驗合之以為心傳云爾脈法勞極諸虛浮軟微弱虛症宜見虛脈為順土敗雙弦兩手俱弦木剋土敗若左手脈細右手浮大徑急亦木剋土敗而主死也知之火炎則數勞症必帶虛數所以難治若六至以上必死骨蒸發熱脈數為虛虛數二脈是其本象熱而澀小必殞其軀發熱脈靜不可救藥氣結或代亦死何疑失血諸症脈必見芤緩小可喜身涼脈靜易治數大堪憂身熱脈大者為難治死候虛勞不能服參耆不受補者死勞嗽聲啞者死一邊不能睡者死皆肺敗之徵久瀉及大肉去者死脾敗之徵嗽不止而白血出者死金受火刑傷極則血竭於肺乃為白沫白涎白液涎沫雖白實血所化一謂白血淺紅色而似肉似肺者勞嗽久而咽痛無聲此為下傳上不嗽不疼久而溺濁脫精此為上傳下皆死吐血若咳逆上氣脈數有熱不得臥者死虛勞所宜飲食藥物及養生之法白花百合湯麥冬湯取其清肺止嗽真玉露霜取其消痰解熱人乳為補陰神品童便乃降火仙方甘梨生食能消火蒸熟則滋陰苡仁湯肺熱脾虛所當用蓮心芡實粳米粥遺精泄瀉最宜求扁豆棗湯專補脾胃圓眼肉湯兼養心脾豬脊髓鰉魚膠填精益髓同雞鴨諸物中煮爛尤佳燕窩亦好鳳頭白鴨烏骨白雞補陰除蒸豬肺煎白芨末保肺止血丸如回生六味左歸乳金四聖固本之屬膏如清金清寧白鳳坤髓集靈衛生瓊玉之屬或間用湯液以治之如內熱甚或發寒熱則用保陰六味婦女或間用逍遙散咳甚用清金或間用噙化吐血用仲淳驗方心跳善驚虛煩無寐則用天王補心丹或脾胃虛弱兼用歸脾食少便瀉量用資生果系乾血勞症審之的確可用大黃䗪蟲之屬傳尸勞獺肝無疑也虛勞所忌飲食諸物及卻病之方煙為辛熱之魁酒為濕熱之最凡薑椒芥蒜及一切辛熱之品熱能傷陰斷不可用並生冷滑腸腎硬之物宜戒恐傷脾胃也又當戒色戒怒解憂免勞為第一經云腎主閉藏肝主疏泄二臟皆有相火而其繫上屬於心故欲心一動相火翕起雖不交會精已暗耗況近色乎又曰怒則氣逆甚則嘔血及飧泄又曰憂愁則氣閉不行又曰思則氣結又曰煩勞太過則氣張於外精絶於內陽擾陰虧之故也切忌火灸仲景曰微數之脈慎不可灸火氣雖微內攻有力焦骨傷筋血難復也選方保陰煎治真陰虛相火熾而發熱其熱在午後子前屬陰分或皮寒骨蒸骨髓空虛火焰骨中則熱中不已汗者乃三焦相火為病無汗者乃心包相火也五心常熱鼻中乾燥唇紅顴赤口苦舌乾皆內熱之徵也耳鳴目眩腰膝痠軟四肢無力倦怠嗜臥皆精血虛損內傷之故大便燥結小便黃赤內熱六脈弦數或虛或無力皆虛損的症不必吐血咳嗽也故有吐血咳嗽症而無上文之內熱虛症脈數仍非虛勞不可不辨若病久飲食少思大便溏泄脾胃傷之故也午後灑淅惡寒少傾發熱或至雞鳴寅卯時分盜汗出而解並以此方或六味左歸加減治之熟地三錢至一二兩生地二三四錢二地補腎陰培其根本麥冬三四五錢清肺降火天冬二三錢二冬清其母氣牛膝酒蒸三四五錢茯苓二三錢引火下行山藥蒸用三四五錢同茯苓以補脾玉竹五六錢治虛損寒熱一切不足用代參耆鱉甲退勞熱在骨及陰虛寒熱往來之上品龜甲補腎陰退骨蒸二甲酥炙各三錢至一兩加桂圓肉十枚至三十枚入人乳牛乳各一杯骨蒸內熱有汗加骨皮二錢無汗加丹皮一錢五分腰痛加枸杞三錢至八錢杜仲二錢余用豬腰子一枚豬脊髓五錢至八錢五味一分至一錢怔忡不寐加棗仁倍桂圓肉咳嗽加桑白皮蜜炙二三錢枇杷葉刷去毛蜜炙三大片白花百合一二兩有痰加貝母二三錢有血加藕汁一杯或童便一杯食少加苡仁炒五錢至一兩泄瀉去生地天冬乳汁加白芍炒三四錢大棗蓮肉二三十粒萸肉或用石斛煎湯煎藥肺經無熱肺脈按之無力者量加人參古方有人參固本丸人參二兩二地二冬各四兩是也固本丸加牛膝枸杞七味均分即集靈膏也此方君以甘寒滋陰添精之品所謂損其腎者益其精也臣以二冬保金而滋其生化之源恐太沉陰濡潤而又佐以甘平補脾之劑顧其中氣備加減之法以善其用六味地黃丸治陰虛腎水不足發熱作渴陰虛則發熱津液少則作渴氣壅痰嗽腎虛不能納氣歸根故氣壅於上火蒸津液凝結成痰嗽者水虛而火上刑金也頭目暈眩眼花耳聾龍火炎則雷火亦發肝血虛而為眩為花陰虛痰火上升故耳聾咽燥舌痛齒牙不固喉嚨舌本皆腎脈之所過腎主骨齒乃骨之餘腎之標也精髓枯而齦骨失潤則齒動搖譬之幾敗木枯則榫寬濕則緊腰脊腿脛痠疼腰為腎之府腎脈循內踝上腨內至股內後廉貫脊精水竭故痠軟疼痛也齒衄便紅吐血凡見血為熱症由君火相火亢甚於是煎迫而越出於諸竅之中也盜汗失音寤屬陽寐屬陰陰虛則汗從寐中盜出閉臟失職也腎虛脈不上循喉嚨挾舌本故失音水泛為痰陰虛火動則水沸泛上而為痰小便淋閉淋者淋澀而痛閉者不通也腎司開合虛則失職金匱云熱在下焦者則尿血亦令淋閉夢遺精滑陰虛而君相妄動也足心乾熱腳跟作痛腎脈走足心入跟內故也經水不調血枯閉絶衝任二脈損傷之故也熟地補髓填精用八兩萸肉補腎氣固元精四兩山藥入手太陰能潤皮膚清虛熱補水之上源以金為水母故也四兩丹皮治手足少陰伏火三兩茯苓淡滲以降陽中之陽三兩澤瀉咸滲以降陰中之陰三兩加麥冬滋燥金而清水源六兩五味子上能收耗散之肺氣下能滋不足之腎水也三兩名八仙長壽丸再加人參是合生脈也煉蜜丸如梧桐子大空心淡鹽湯下四五錢若煎服則制小其劑發熱作渴加鱉甲二冬花粉氣壅加沉香砂仁麥冬痰嗽加貝母花粉百合麥冬眩暈加甘菊鉤藤枸杞耳鳴耳聾加磁石羊腎花粉咽燥舌痛加二冬元參齒牙不固加麋茸豬牛脊髓麥冬五味腰痛加枸杞杜仲麋角湯內鎊酒焙亦可龜甲湯內炙用丸中煎膏腿脛痠疼亦如之再加牛膝虎脛齒縫牙齦出血加麥冬童便骨碎補麥冬煎湯頻頻漱之便血加麥冬龜甲五味白芍不止宜補胃氣更宜加人參溺血若痛者為血淋加牛膝如陰莖時舉溺管脹痛者再加黃柏知母不痛者為尿血加麥冬白芍牛膝降香入童便藕汁人參茅根汁各一杯和服盜汗加棗仁五味白芍圓肉失音加麥冬生雞子人乳竹瀝梨汁水泛為痰倍茯苓小便淋閉俱加二冬牛膝此味為君車前莖中痛加甘草梢夢遺精滑加蓮鬚五味龍齒牡蠣鰾膠相火盛陽易舉者加鹽炒黃柏足心乾熱加二冬牛膝龜甲足跟作痛加牛膝鹿角龜甲虎脛骨經水不調血枯閉絶參後歸脾湯加減法以上加減諸法保陰左歸仿此此純陰重味潤下之方也純陰腎之氣重味腎之質潤下腎之性宋錢仲陽用此方治小兒齒遲語遲腳軟行遲囟門不合陰虛發熱諸症以皆屬腎虛緣小兒稚陽純氣故以仲景八味丸去桂附而但補其真陰隨手輒效明薛立齊因之悟大方陰虛用丹溪補陰法不效以此代之立效薛氏加減之法甚多即如本方去澤瀉加黃耆以合養血之奇蓋為發熱作渴小便不調理無再竭故去澤瀉又入生脈散以生金滋水虛則補母之義復合異功散以崇土生金兼母之外家而補之更其名曰人參補氣湯加減變合無窮真如游龍戲海之妙舉一為例學者當善悟其法而以意通之則不可勝用矣趙養葵醫貫一書得力於薛氏醫案而益闡其義觸處旁通外邪雜病無不貫攝而六味之用益廣試舉其陰虛諸症所用如雲世之真陰虛而發熱者十常六七亦與外感無異余於陰虛發熱者見其火熱面赤口渴煩躁與大劑六味湯服之而愈又云陰虛火動則水沸泛上為痰其痰重濁白沫與火衰水泛為痰純是清水者不同動於腎者猶龍火之出於海龍興而水附動於肝者猶雷火之發於地雷出而雨隨用六味湯以滋陰降火此不治痰之標而治痰之本既治其本復宜補脾以制水方為良法又云咳嗽必責之肺以治之之法不在於肺而在於脾而又歸重於腎人有咳嗽暴重動引百骸自覺氣從臍下逆沖而上者此腎虛不能納氣歸原當以六味湯主之毋徒從事於肺以肺司出氣為氣之主腎司納氣為氣之本又腎為肺之子虛則補其子也大凡陰虛咳嗽起於房勞火上刑金咳則肺金必傷余先以六味之類壯其水使水升而火降然後以參耆救被傷之肺兼有虛則補母之義一舉兩得之法也若不先壯水以鎮火而遽投參耆以補陽反使陽火愈旺而金益受傷豈藥之罪哉此所謂不識先後著者也如火不降則參耆始終難用治陰虛之所以難也又云腎水虛則有火有火則有痰有痰則咳嗽咳嗽甚則喘宜六味丸加麥冬五味牛膝之屬大劑重飲蓋陰症發喘去死不遠幸幾希一線牽帶在命門之根尚爾留連善治者惟以助元元接直下鎮墜之藥俾其返本歸元或可回生然亦不可太峻也又云陰虛喉痛屬少陰之病少陰之火烈如奔馬逆沖而上到咽喉緊要之所緊鎖氣鬱結而不得舒或痛或腫其症必內熱口乾面赤痰涎湧上其尺脈必數而無力須六味加麥冬五味大劑飲之褚氏所謂上病療下也又云陰虛失血一症分言之則有嘔血吐血或出於胃經或出肝經咯血出於腎經或出於心包咳血出於肝經唾血出於腎經或出胃經衄血出於肺經或出胃經痰涎血者出於脾經合而言之皆屬於腎蓋腎中之真水乾則真火炎血亦隨火沸騰故錯經而妄行越出諸竅褚氏所謂服寒涼百不一生飲溲溺百不一死愚謂六味湯獨補腎水性不寒涼不損脾胃久服則水升火降而愈又須人參補脾補胃藥以收功蓋初時忌用人參者不欲其補助陽氣也及火既歸原人參又所不禁然亦宜同滋陰藥中用之則善又云陰虛小便不通因汗多五內枯燥膀胱原無水積強欲通之如向乞人而求食其可得乎惟六味滋水小水自來切忌淡味滲泄之藥又云陰虛之人大便閉結者是因腎之津液虧少惟以六味加二冬人乳牛乳滋陰潤燥而便自如常又云腎為陰主藏精陰虛則精不藏肝為陽主疏泄陽強則火不祕以不祕之火加臨不藏之精故夢交即泄惟用六味補水總有相火水能滋木水升而木火自息沈氏謂因君心一動相火隨之則成夢境而氣搖精泄治法總不越補腎水斂元精安心神為主余因世人喜用六味之方而未能盡明用方之旨故詳及之左歸丸治症同熟地八兩萸肉蒸四兩枸杞三兩菟絲子酒煮焙乾三兩牛膝酒蒸三兩山藥人乳拌蒸四兩龜膠四兩鹿角膠四兩鹿角補陽右腎精氣不足者宜之麋角補陰左腎血液不足者宜之節齊云左尺常虛右尺常旺若左右兼補依舊火勝於水只補其左制其右庶得水火相平余治真陰不足之症每以麋角代之若平人調理用之俱酒化上用膠丸如桐子大空心服煎膏服亦可如真陰失守虛火上炎者宜用純陰至靜之劑去枸杞鹿角膠加女貞子麥冬三兩火灼肺金干苦多痰者加百合三兩夜熱骨蒸加骨皮三兩小水不利加白茯苓三兩大便燥澀去菟絲子加肉蓯蓉四兩血虛有滯者加當歸四兩凡五液皆生於腎故凡屬陰分之藥亦無不走於腎有謂必須引導者皆所見之明耳此方壯水之主以培左腎之元陰凡精氣大損年力俱衰真陰內乏不能滋溉營衛漸至衰羸即從純補猶嫌不足若加苓澤滲利未免減去補力奏功為難故群隊補陰藥中更加龜鹿二膠取其為血氣之屬補之效捷耳景嶽云余及中年方悟補陰之理因推廣其義而制左歸大飲但用六味之意而不用六味之方活人應手之效不能盡述左歸飲治症同熟地二三錢至一二兩萸肉一二錢畏酸少用之枸杞二錢相火盛者去之山藥二錢茯苓一錢五分甘草一錢妙在此味經所謂調以甘藥也肺熱而煩加麥冬二錢肺熱多嗽加百合二錢血少者加當歸二錢血滯而熱者加丹參二錢陰虛不寧者加女貞子二錢血熱妄動者加生地二錢脾熱易飢及多汗傷陰者加白芍二錢心熱多燥者加元參三錢腎熱骨蒸者加骨皮二錢津枯熱渴者加花粉二錢上實下虛者加牛膝二錢以導之本方加人參當歸即補元煎回生丸自制治虛勞等症功在六味左歸之上不可忽者也熟地八兩萸肉四兩枸杞四兩菟絲子四兩牛膝補腎酒蒸四兩山藥六兩茯苓四兩人乳拌蒸曬至加倍重用白芍酒炒四兩蓮肉去心六兩芡實略炒四兩砂仁略炒四兩麥冬去心八兩棗仁略炒六兩北五味斂肺蜜水拌蒸焙乾四兩圓眼肉養心炙乾六兩煎膏倍用蓮鬚澀精固腸四兩麋角膠補真陰四兩龜膠八兩龜甲膠退骨蒸四兩俱用地黃汁溶化用甲酥炙六兩虎骨膠壯筋骨四兩煎濃麥冬湯溶化亦可鰾膠牡蠣粉炒八兩黃牛肉補脾胃去油膜十斤熬膏豬脊髓填精髓三十條去筋膜搗爛蜜熬紫河車膏峻補氣血吳球制大造丸用此以其有奪造化之權極誇其功效也八兩製法泔水洗淨隔湯煮熟搗爛干藥拌勻曬乾共二十四味諸膏髓丸如桐子大空心圓眼湯下或淡鹽湯下每服三四五錢脾胃弱而難化者煎膏服之嫌其氣腥斟酌去之熬成或加人乳牛乳各十杯豬髓倍之糜角留之亦可也若兼咳嗽者不時兼服噙化丸或清寧膏有血兼飲自便用麥冬米仁煎湯多飲小便自清白此方補腎理脾保肺兼而有之補腎用熟地萸肉枸杞菟絲子牛膝有理肺藥以佐之則不嫌其滋潤理脾用山藥茯苓白芍蓮肉芡實砂仁者以其無香燥傷陰之患兼能入腎經也砂仁似燥然辛能潤腎且腎虛不能納氣歸原非此嚮導不濟更得滋陰藥以君之用之無虞矣麥冬清肺五味斂肺皆所以保肺也保肺金正以生腎水理脾土亦為生金以生水也棗仁圓肉養心一恐水虛而火旺耗血一恐心虛而下不交腎蓮鬚澀精固腸糜角補真陰龜鱉二甲退骨蒸豬脊鰾膠填精髓牛補脾胃虎壯筋骨河車峻補精血是以血肉之物補血肉之軀也功效甚速也嘉言云虛勞之疾百脈空虛非黏膩之物不能填實精血枯涸非滋陰之物不能濡潤是以治虛勞縱遇能消丸藥之人亦必兼膏服之若脾弱者尤為定法內熱甚重加除蒸之品一二味此方凡男婦陰虛欲成虛勞者急宜服之清金散自制治陰虛咳嗽或多痰或乾咳或痰血紅或純血麥冬三四錢天冬潤肺二錢白花百合保肺一兩有血倍用桑皮瀉火蜜炙二錢咳甚倍用骨皮二錢內熱甚加一錢薄荷清熱一錢花粉消痰二錢茯苓補脾二錢貝母二錢痰多痰紅倍用枇杷葉降火蜜炙三大片咳甚加米仁補肺熱燥脾濕五錢食少有血倍用入人乳牛乳各一杯妙煎成加煉蜜或飴糖數匙薄荷貝母研細亦和勻其內頻頻溫服酒客病加甘蔗汁半杯有血加生地三四五錢茅根四兩藕汁童便各一杯此潤燥清金降氣消痰之劑凡陰虛咳嗽酒客病最宜服之若熱甚痰多大便燥結者加梨汁半杯燉滾服合本方人乳此二味即接命丹也能消痰降火補虛生血治虛損之症以人補人其妙無加加味清寧膏治症同生地補陰四兩酒拌略蒸麥冬四兩白花百合八兩曬乾四兩桑白皮蜜炙三兩款冬花二兩百部三兩玉竹補脾潤肺四兩薄荷清肺三兩貝母消痰三兩山藥蒸熟六兩以上三味研細入膏桔梗一兩枇杷葉蜜炙八兩橘紅一兩米仁炒八兩泄瀉加四兩茯苓二兩白芍酒炒三兩炙甘草一兩圓眼肉四兩大棗補脾六兩十六味煎成膏加飴糖白蜜各一斤俱煎極熟收之俟冷入薄荷貝母山藥末拌勻時時挑置口中噙化或白湯調服亦可臨臥及睡覺噙之更佳亦可小劑作煎飲空心兼服保陰回生之屬此方補陰清肺益脾降氣消痰之劑士材云虛勞之所難者如脾喜溫燥清肺則礙脾肺喜清潤補脾則礙肺惟燥熱甚而能食不瀉者清肺為主而參以補脾之品倘虛羸而食少泄多雖喘嗽不寧但以補脾為要清潤之品所宜斟酌以脾有生肺之能肺無扶脾之力故制清寧膏一方而兼補脾陰之藥注云潤肺不礙脾補脾不礙肺以肺屬金而法天脾屬土而法地曰清寧者脾肺兼理取天清地寧之義也愚以此方另添數味投之輒效用方者弗以品多而去之可也按經言腎病而謂諸陽氣浮無所依從故嘔逆上氣喘蓋陽根於陰腎陰虛則陽無依而上升為嘔噯喘逆諸症沈氏謂虛勞咳嗽皆由陰虛陽盛氣為陽氣有餘便是火火性上炎勢必刑金肝木挾心相二火上逆反侮肺金故咳嗽無度至於黃昏肺氣不能歸納腎間夜咳愈甚但肺為嬌臟咳傷肺膜則痰中見血火蒸精液化為痰涎痰火交結咳逆無休肺陰日衰以致音啞聲嘶則不治矣故初病之時急宜降氣消痰調養脾胃以生營衛清潤肺金以生腎水俾心火有制不刑于肺金水相生陰火退伏而咳自寧矣古方治乾咳嗽有瓊玉膏用生地四兩茯苓十二兩人參六兩白蜜二斤臞仙加琥珀沉香各五錢同參茯為末隔湯再煮自云神效異常此雖以滋陰藥為君然人參乃肺熱所忌宜酌用之噙化丸治陰虛久嗽噙化三冬橘貝杷柿霜甘桔味天花桑皮部菀元參薄煉蜜丸如彈子誇麥冬去心三兩天冬火灼肺燥則喉中淫癢為咳嗽故以二冬滋陰潤燥清金降火去心二兩桑皮火不乘金則嗽自緩故以桑皮瀉肺之火蜜炙三兩款冬花辛溫開豁卻不助火三兩貝母去心二兩百部潤燥清熱兼能殺蟲去心三兩薄荷葉辛能散熱涼能清利三兩柿霜一兩花粉治嗽以理痰為要故以貝母柿霜潤肺中燥痰花粉治膈上之熱痰二兩橘紅一兩枇杷葉蜜炙二兩紫菀茸治痰以理氣為先二味皆下氣氣降則火清痰順而嗽自止一兩元參治胸中氤氳之氣無根之火一兩五味咳久必耗氣用五味酸收之品蜜炙一兩桔梗一兩甘草咳屬上焦故用甘桔為舟楫之濟炙一兩共十六味蜜丸如彈子大不時噙化臨臥更佳亦可作膏服此潤燥清金降氣消痰而兼收斂之劑仲淳所制用治陰虛咳嗽不止者立應愚謂世人患陰虛者多如傷風咳嗽外邪已解久而不愈服之甚效天王補心丹治憂愁思慮傷心心為君主心傷則神去頃刻云亡凡云心病皆包絡受病心血不足神志不寧心藏神腎藏志心腎不交神志不寧健忘怔忡心跳善驚皆心血虛之故血虛則心生火火則生痰痰動心包故驚跳及夢寐不寧怔忡者心中惕惕恍惚不安如人將捕之狀也虛煩無寐腎水不上交心火無所制亦心血少之故仲淳云不寐清心火為主大便不利心主血心傷則血燥而便難小便短赤心與小腸為表裡藏移熱於府咽乾口渴津液被灼口舌生瘡等症心火上炎人參補心氣五錢虛者量加也當歸養心血一兩棗仁炒四兩五味收心液五錢茯神二兩遠志五錢丹參安心神五錢生地四兩柏子仁二兩麥冬益心津二兩天冬二兩元參壯腎水一兩桔梗引諸藥停留上焦不使速下也五錢十三味蜜丸如彈子大加硃砂護心一兩五錢研細為衣一方用黃連心火甚者加之亦可食遠臨臥時竹葉燈心湯或桂圓湯化服噙化更佳此生津養血清熱安神鎮心之劑勞心之人所宜服之昔志公禪師日夕誦經鄧天王憫其勞錫以此方因得名焉他如安神則有石斛龍齒珍珠琥珀清熱則有犀角木通辰砂益元散豁痰則有竹瀝貝母天竺黃膽星牛黃鎮驚則有金箔代赭石皆可隨症選用愚按經文心為五臟六腑之大主而總統魂魄兼該志意故憂動於心則肺應思動於心則脾應怒動於心則肝應恐動於心則腎應凡喜怒憂恐悲思驚七情雖分屬五臟然無不從心而發經云心主一身之脈又云心生血是心者血之原故心不妄役則其血日生惟勞心過度心血日耗由是臟腑無所潤筋脈無所養營氣衰少邪熱隨作所謂陰虛生內熱者是也若腎水不虛猶能上交心火不至灼肺為害虛則心火無制亢甚刑金為咳而喘肺陰消灼身體羸瘦而危亡可立待矣此症不得志者多有之故治斯症者必兼壯水為主又須顧慮中氣為重大凡虛勞之人無論何臟受傷非內熱骨蒸即不謂之虛勞非食少泄瀉肌肉消瘦尚不至死地所以孫思邈謂補脾不如補腎許學士謂補腎不如補脾二先生深知二臟為生人之根本故凡病皆宜脾腎不獨虛勞為然也歸脾湯治思慮傷心脾在志為思也健忘怔忡驚悸不寐悸者心築築跳動也自汗盜汗汗為心之液凡汗出無有不從心液而來自汗有陰陽之分盜汗則專屬心腎陰虛故睡則汗出也或勞倦傷脾應酬太煩奔走太苦飲食失節皆能傷脾肢體痠疼脾主四肢肌肉故也然久立傷骨久行傷筋則肝腎亦傷所以亦有兼筋骨腰痠也嗜臥少食脾傷則神亦倦故嗜臥又腎病則嗜臥精竭者神倦也少食者胃傷也或心脾虛痛所謂胃脘當心而痛是也大便不調脾主大便虛則或滯或閉是其本病也血無主統心虛則不能生血脾虛則不能統血錯經妄行或上或下皆是或血虛發熱晡熱申酉時心脾血虛皆發熱晡熱或經不準閉絶等症心脾受傷之故亦有房勞傷腎惱怒傷肝而損衝任二脈所致人參虛者多用黃耆蜜炙白朮米泔水浸半日隔土蒸曬乾再用白蜜調人乳浸照上法蒸曬共九次各一二錢炙甘草補氣健脾五分茯神一二錢棗仁研炒三五錢遠志安神補心以生神五分原方無當歸養血益肝以生心五分原方無圓眼肉甘先入脾以脾喜甘也十枚木香香能快氣以脾喜通也三五分他如驚悸怔忡加辰砂麥冬不寐多用棗仁圓肉加生地麥冬石斛竹葉如有痰者再加竹瀝天竺黃自汗多用參耆盜汗多用棗仁加白芍五味生地麥冬而參耆木遠四味隨症減去肢體痠疼加牛膝續斷秦艽二地食少多用人參胃脘心痛倍木香加砂仁橘紅大便泄瀉倍白朮加米仁山藥蓮肉便血加生地白芍麥冬五味血熱甚者加地榆血虛發熱晡熱加地冬而參耆木香隨症去留如因肝經血虛而寒熱如瘧者則宜逍遙散加減如腎中陰虛而發熱者則宜保陰六味之屬經水先期者為血熱色紫黑者熱之甚加二地白芍五味麥冬熱甚者加龜甲黃柏而參耆木香隨症去留後期者為血虛色淡者為虛之甚倍當歸加地芍枸杞麋角龜甲兼服六味左歸經水或前或後不一其症氣亂患從虛治仍照上法再加四制香附為氣病之總司女科之主帥同艾浸浸二宿分作四分一分鹽水浸炒一分酒浸炒一分童便浸炒一分人乳浸炒經水閉絶屬心脾虛者倍當歸加地芍若因火盛陰虛血枯者則宜參用六味左歸之屬加柏仁澤蘭麥冬白芍如因氣血鬱滯或肥人痰多壅閉等症另消息治之崩漏加地芍麥冬五味萸肉龜甲血餘本方加柴胡山梔是加味歸脾湯也此方補氣養血安神乃心脾肝三經之藥宋嚴用和所創內經所謂二陽之病發心脾有不得隱曲女子不月者也胃足陽明與大腸手陽明為二陽蓋人之情欲本以傷心母傷則病及其子勞倦本以傷脾臟傷則病連於腑故凡內而傷精外而傷形皆能病及於胃此二陽之病所以發心脾也不得隱曲陽道病也夫胃為水穀之海主化營衛而潤宗筋如經云前陰者宗筋之所聚太陽陽明之所合也胃病則失生化精血之原故為陽衰少精其在女子則為不月又云其傳為風消其傳為息賁者死不治胃家受病久而傳變則肝木勝土風淫而肌體消削胃病則肺失所養故氣息奔急氣竭於上由精虧於下敗及五臟故死不治所以病才見端即為療治原方無遠志當歸薛氏加入以治血虛又加丹皮山梔以治血熱而陽生陰長之理乃奮隨手變化通於各症無不神應趙氏謂凡治血症須按三經用藥心生血脾統血肝藏血歸脾湯一方從肝補心從心補脾率所藏所生而從所統所謂隔二之治其意蓋歸血分藥一邊後人不解妄為加減盡失其義即有稍知者亦只謂治血從脾雜入溫中香燥劫陰之劑而嚴薛二家之旨益晦高鼓峰熟於趙氏之論獨悟其微謂木香一味香先入脾縱欲使血歸於脾此噓血歸經之法然嫌其香燥反動肝火而干精液故其用每去木香而加白芍以追已散之陰且心血衰少火必刑金白朮燥烈恐增咳嗽得芍藥則太陰為養營之用惟脾虛泄瀉者方留木香以醒脾脾挾虛寒者方加桂附以補陽而外此者出入心肝脾三經甘平清潤之藥愚謂經期不準閉絶崩漏及便血等症本方加減多所相宜若嘔吐諸血果屬氣虛不能統攝必面色黃白而無神言語輕微而倦怠脾胃虛薄而不調六脈微弱而不數者亦可用本方然患氣虛失血者甚少即思慮傷心勞將成未成之界未見腎陰虛諸症而兼脾虛症候或大便溏泄者則宜是方若內熱骨蒸已成虛勞又宜壯水滋陰為要縱食少便泄非參耆白朮助陽之品所宜矣若勞役而兼勞心者是心脾俱傷具前列之症未見肺腎陰虛諸病者可用本方加減然勞倦傷脾乃脾之陰分受傷者多故經云陰虛生內熱因有所勞倦形氣衰少穀氣不盛上焦不行上脘不通胃氣熱熱氣熏胸中故內熱是宜補脾胃之陰此勞役太過陽和之氣亢極化火火旺則陰虛內熱但非色欲傷腎真陰虛而生內熱之難療又云有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水藏也今水不勝火則骨枯而髓虛遠行勞倦骨必受傷逢大熱者或逢天令之熱或陰不足而內熱火旺水虧故骨枯髓虛而必腎虛諸症見矣此平時色欲過度以致不能勞役而然急當壯水滋陰為主亦非本方之所宜也逍遙散治鬱怒傷肝肝血虛少抑鬱多怒肝火旺而血虛寒熱如瘧必先有微寒此陽陷入里之故肝血少則發寒熱非真如瘧之大寒大熱也暮熱朝涼血虛則暮熱起居如常故此症最能誤也五心煩熱鼻燥咽乾血虛則內熱矣頭暈眼花兩目乾澀肝傷血少之本病也脅肋作痛肝脈布脅肋也肢體盡疼血不能榮筋也嗜臥少食子病及母故嗜臥肝木乘胃故食少月水不調血熱相搏故也或小腹重墜水道澀痛或腫痛出膿亦有陰中癢者皆肝火所致以肝脈繞陰器抵小腹也或遍身瘙癢赤白遊風或瘰癧結核等症肝傷火旺血燥生風或疱瘩瘙癢或膿水淋漓或赤或白遊行無定瘰癧結核皮色不變皆屬肝火血燥而筋攣所致瘰癧則纍纍如貫珠多生於前後胸脅間結核則如榛如豆亦有纍纍如貫珠者不拘頭項肢體皆結也柴胡能散諸經血結氣滯薄荷木不能郁故用柴薄之辛以散之各五錢此味趙氏加入白芍肝氣不可以補白芍之酸寒者以瀉肝火當歸肝血不可虧歸為血藥以養之如嫌辛溫些少用之或生地涼血補陰之品或另代二地丹參之屬乳制白朮木盛則土衰術以扶之如嫌香燥或另代石斛米仁山藥之屬茯苓木枯則易焚木火通氣心必不寧苓以寧之愚每兼用麥冬以清心降火甘草肝為將軍之官火動必猛烈丹溪云火甚不可驟用寒涼蓋恐撲之而愈焰以生甘草瀉而兼緩猖狂自定各一錢加丹皮涼血活血黑山梔瀉火各五分名加味逍遙散趙氏以山梔屈曲下行泄水改用吳茱萸薑汁炒黃連呂晚村云山梔亦不止治水但不若黃連之運用在上能達心胃之郁耳愚謂如見吞酸症用之如神此方辛散酸收甘緩養血而兼寧心扶脾之劑乃肝經之要藥女科之神劑也倉公傳與褚氏論皆云師尼寡婦獨陰無陽陰陽以男女言欲心萌而未遂是以懨懨成病以致乍寒乍熱而如瘧狀久則成勞愚謂大凡女人多郁鬱怒則傷肝氣結血凝火旺血虛而成勞所以前論云童子室女不生歡笑及寡婦僧尼易犯此症也立齊女科醫按每用此方屢屢見功又云若因鬱怒傷肝而寒熱有怔忡不寐少食等症者參以加味歸脾湯治之李時珍云寇氏乃謂柴胡本草無一字治勞不分臟腑有熱無熱一概擯斥殊非通論東垣則謂諸有熱者加之無熱去之愚謂勞有五勞病有五臟柴胡為肝膽心包三焦引經之藥故勞在肝而寒熱如瘧者正宜用之若勞在肺腎者不可用耳沈氏云若病起於肝先見脅痛而後咳嗽乃木挾心相刑金先治其本加清金之藥兼治其標原有郁甚舒肝之說也嘉言謂虛勞畏寒發熱禁用小柴胡湯又謂骨蒸發熱熱深在內里禁用一切輕揚之劑恐引熱勢外出而增其熾灼干津液肌肉正與上言勞在肺腎不用柴胡之說相合此方趙氏極稱其用之廣而效之神凡寒熱往來如瘧嘔吐吞酸嘈雜胸痛脅痛小腹脹悶頭暈盜汗黃膽風溫疝氣飧泄一切鬱症皆對症之方以此加減出入無不獲效愚按師尼寡婦欲念一萌腎中相火必動動久則水必虧鬱怒傷肝火旺血虛肝木將槁若非腎水澆灌則乾柴烈火燎原不可止遏雖用本方必兼壯水為主仲淳驗方治吐血如神生地補腎壯水制火四錢白芍制肝斂氣涼血三錢麥冬清心心既清寧妄行者息五錢天冬二錢貝母二錢桑皮清肺肺得清肅氣能下降二錢米仁養脾脾旺則能統血五錢蘇子炒研五錢橘紅二錢枇杷葉降氣氣降則血歸經三片茅根甘寒可除內熱性又能入血消瘀一二兩牛膝引藥下行生用則去惡血二錢鱉甲肝經血分之藥補陰清熱兼能下瘀三四五錢降香降氣行瘀一錢加藕汁一杯童便一杯此方滋陰涼血清熱降氣而兼行瘀之劑纍試輒驗然陰無速補之法非多服不效病者欲速其功醫者張皇無主百藥雜試以致隕身仲淳既立前方更發明之云治吐血有三要法一宜行血不宜止血血不遁經絡者氣逆上壅也降氣行血則血循經絡而自止若止之則血凝必發熱惡食及脅痛病日沉痼矣二宜補肝不宜伐肝經曰五臟者藏精氣而不瀉者也肝為將軍之官主藏血吐血者肝失其職也養肝則氣平而血有所歸若伐之則肝虛不能藏血血愈不止矣三宜降氣不宜降火氣即火火即氣故氣降即火降血隨氣行無溢出上竅之恐若用苦寒降火則反傷脾胃脾愈不能統血矣今之療吐血者其患有三芩連知柏硝黃此苦寒敗脾傷胃一也乾薑桂附此辛熱助陽劫陰二也人參黃耆所謂肺熱還傷肺三也亦有用參而愈者此是氣虛咳嗽不由陰虛火熾所致乃百不一二也失血方論平正切用者莫若仲淳然諸家皆有治論不可不考劉氏云阿膠鬱金皆治血之神藥患無真者沙參雖補五臟之陰其性平淡未能速效市中所市皆近山之土桔梗誤用之則反提濁氣不可不辨至若三七血餘山羊血人中白之屬皆稱藥亦可隨宜取用本草方云吐衄來勢甚者以麥冬一斤煎濃汁入煉蜜少許分作二服即止士材云凡吐血如脈洪有力精神不倦胸中滿痛或吐血塊宜生地牛膝赤芍丹參桃仁大黃之屬從大便導之血以上出為逆下出為順非大虛泄瀉者當行之以轉逆為順此釜底抽薪之法若吐血已多困倦虛乏者不可行也沈氏云若傾盆大吐不止者乃腎肝真殞傷木火過旺脾胃血虛不攝必須顧慮元氣以防氣脫急當破格挽回暫用獨參湯一兩至三四兩入童便溫服趙氏用人參一二兩為細末入飛籮面一錢新汲水調如稀糊不時啜服蓋有形之血不能速生無形之氣所當急固恐陰血未盡陽氣先脫而死俟其大勢稍定再用陰分之藥則萬舉萬當趙氏云凡治血症先分陰陽陰虛者壯水滋陰為主間有陽虛者其人平素氣虛挾寒更或身受寒氣口食冷物脾胃愈虛寒而不能統血血亦錯行所謂陽虛必走耳其血必黑黯其色必㿠白其身必清涼其脈必微遲無內熱骨蒸虛勞諸症者可用理中湯炮姜炒黑則止而不走亦兼散凝血加木香當歸之屬以理中能止傷胃吐血理中焦之虛寒若腎中真陽衰弱下焦寒冷龍火上炎血隨上出者必有真寒的症當用八味冷飲以引火歸原既分陰陽又須分三因風寒暑濕燥火為外因余曾治一貧人冬天居大室中臥大熱坑而得吐血余謂貧人冬居大室衣蓋單薄表感微寒壅遏裡熱火邪不得舒伸故血出於口憶仲景於太陽傷寒當發汗而不發因致衄血者用麻黃湯遂仿其法以微汗之一服而愈蓋汗與血一物也奪血者無汗奪汗者無血自然之理也若傷暑而衄必心煩口渴眩暈面垢自汗嘔惡等症其脈必虛宜竹葉石膏湯清解暑邪加犀角生地以涼血清心蓋暑傷心心主血故也又經云濕淫所勝民病血見燥氣流行咳逆血溢是宜以治濕治燥為本而兼治其標蓋世人陰虛者多只因內有陰虛火症外為風寒暑濕所郁鬱則火不得泄血隨火妄行而越出諸竅矣喜怒憂思悲恐驚為內因是故怒而動血者火起於肝憂而動血者火起於肺思而動血者火起於脾驚而動血者火起於心勞而動血者火起於腎能明乎火之一字而於血之理思過半矣鬥毆跌撲負重閃挫及飲酒過多炙爆辛熱過啖者隨宜施治此不內外因也凡失血之後必發大熱口渴心煩微汗六脈豁大空虛名曰血虛發熱古方用當歸補血湯然不若六味湯加減治為善也趙氏所論陽虛及真陽衰弱並外感風寒濕氣諸症失血此非恆有之症必審察明確方可依此施治不宜漫為嘗試總遇此症當中病則止不可過劑按嘉言云桂附引火歸原之法可暫而不可常觀其治猝暴中寒陽微陰盛之症用桂附回陽之後即改用地冬梨汁竹瀝甘寒之屬辛熱之藥始先不得已而暫用陽既安堵即宜休養其陰則凡用辛熱辛散之劑其不可過用也明矣況虛勞失血的系陰虛當從仲淳方論為主前云有吐血而非虛勞者如上所言諸症是也乳金丹治虛勞等症久服神效香甜濃白人乳置薄銀碗內隔湯煮熱以竹箸劈開一頭夾上號沉香線扎不住手攪之乳干為度衆手丸如桐子大早晚白湯下三四錢可用參者參湯下之彌佳此方乃營衛之形質而無寒熱陰陽之偏大補榮衛氣血亦返本還原之上品也坤髓膏補中填骨髓潤肺澤肌膚安臟平三焦續絶陽益氣力除消渴寧咳嗽久服增年虛損更宜黃牛脊髓腿髓全用彌佳去筋膜搗爛八兩山藥蒸研細末八兩煉白蜜八兩共搗勻入瓷器內隔湯煎一炷香為度空心用雞子大一塊白湯調服此補精填髓潤肺寧嗽之劑誠簡便之良方虛損之神藥也白鳳膏自制治虛勞內熱骨蒸咳嗽痰血烏嘴鳳頭白鴨一隻令餓透將二地二冬青蒿鱉甲骨皮女貞子各四兩共為末或用八仙長壽丸料為末亦可每用秈米一升用藥一兩同煮連湯水與食令極肥宰血陳酒沖服將鴨去毛挖淨肚雜如常用甜白酒加鹽少許煮爛空心服之更妙若作丸服仍用前藥一料為細末入鴨腹中麻線扎定以清白人溺煮爛去骨搗為丸服此方滋陰除蒸化痰止嗽亦血肉有情之劑虛勞之人所宜常服誠聖品也四聖丸治虛損如神紫河車膠十二兩龜甲膠八兩麋角膠四兩以上三味名三益膏人參十二兩為細末人乳拌蒸或曬烘乾拌重至二十四兩為度若肺間有火咳甚痰多者不宜用參可以茯苓代之制亦如上法濃麥冬湯入三益膏隔湯煮煬搗勻為丸桐子大空心白湯送下四五錢或竟三益膏中加茯苓乳粉拌勻麥冬湯化服亦可此方峻補精血之神劑無有更出其右者好色之人及本元虛弱之體或此丸或衛生膏之屬預宜長服若已成虛勞內熱骨蒸等症者更宜參以壯水滋陰除蒸之品如二地二冬青蒿鱉甲骨皮女貞子之類也衛生膏治虛勞等症久服大效人參黃耆二味肺有熱者去之生地熟地天冬麥冬牛膝甘枸杞圓眼肉五味以上去圓眼肉五味黃耆即集靈膏熬成膏再加鹿角膠真陰虛糜角膠代之龜甲膠虎骨膠全俱再去尾骨浸三日刮去黑穢煮滾再刷洗淨煎三日夜去骨熬膏霞天膏黃牛肉去皮油浸去血水頻頻換水乃得不腥氣煎濃汁去肉熬膏梨汁自煎上十四味各等分五味子減半此方益氣血生津液補精髓壯筋骨凡虛弱之體宜預服之久自神效老人常服能御妾生子誠衛生之神丹也資生丸健脾開胃消食止瀉調和臟腑滋養榮衛神效不能盡述人參補脾胃之元氣三兩白朮健脾之陽陳壁土拌蒸借其土氣以助之蜜同乳九制制其燥性以馴之三兩茯苓一兩五錢甘草五錢炙山藥蒸一兩五錢扁豆去殼炒一兩五錢蓮肉去心炒一兩五錢藿香五錢米仁淘淨炒三兩芡實補脾陰炒一兩五錢楂肉炒焦二兩白蔻仁去衣炒三錢橘紅辛香以疏其滯氣二兩麥芽炒焦一兩五錢神麯消導以助其健運炒二兩川連瀉脾胃火酒炒五錢桔梗為舟楫之劑焙五錢澤瀉利脾胃之濕鹽水炒三錢五分共十八味蜜丸如彈子大重四五錢開水化服此方調補脾胃之聖藥方下所治非為虛勞設也然虛勞症最重脾胃如食少瀉多用補脾陰藥不效上焦不致煩熱甚者必不得已推用參朮間服此方庶幾近之臨症斟酌暫投無使有陽旺之害可耳按嘉言論參朮膏一方謂治虛勞藥品功效敏速莫逾於此然虛勞症之屬氣虛及陽虛者絶少也大黃䗪蟲丸金匱云五勞虛極羸瘦經云五勞所勞傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋是血氣肉骨筋各有虛勞病也然必至脾胃受傷而虛乃難復故虛極則羸瘦大肉欲脫也腹滿脾不健運也不能飲食胃不容納也食傷飲傷憂傷房勞傷飢傷勞傷經絡榮衛氣血傷其受病之原不同皆可以漸而至極內有乾血諸傷臟腑則真氣不能統血於周身營血痹著而不行於經絡是以瘀積不散而內有乾血也肌膚甲錯甲錯者如鱗也兩目黑黯肝主血主目乾血之氣內乘於肝則上熏於目而黑黯也緩中補虛此丸主之瘀血得去飲食自進則氣血復故為緩中補虛大黃酒蒸三兩䗪蟲三兩水蛭炒枯虻蟲去足翅炒蠐螬炙焦乾漆炒至煙盡各加錢上四味太峻去之或另用去瘀藥品亦可也桃仁去皮尖炒三兩皆破血去瘀之品君以大黃聽令於將軍矣黃芩清熱以瘀久必生熱也酒炒一兩杏仁利氣以氣滯則不行也去皮尖三兩生地四兩芍藥收養陰血酒炒二兩甘草調和諸藥一兩十三味為末蜜丸小豆大酒送五丸每日三服此方破血行瘀乃世俗所稱乾血勞之良治也內有乾血瘀積之久牢不可拔新生血不能周灌與日俱積決無生理仲景施活人手眼以潤劑潤其血之干以蠕動啖血之物行其死血峻藥緩圖陸續漸除俾瘀積去而虛勞庶可復死裡求生之方也嘉言云有勞之之極血滯不行惟就乾涸皮鮮滑澤面無榮潤於是氣之所過血不為動徒蒸血熱或日晡或子午始必干蒸候蒸散微汗而熱解熱蒸不已不死何待甚有熱久則蒸其所瘀之血化而為蟲遂成傳尸瘵症又云童子臟腑脆嫩才有寒熱積滯易於結癖成疳待其血痹不行氣蒸發熱即女子血乾經閉發熱不止勞瘵之候更多待其勢成縱有良法治之無及倘能服膺仲景幾先之哲於男子童子女子瘵病將成未成之候胃氣尚可勝藥急宜導其血同人參以行之如瓊玉膏中加桃仁泥大黃末之屬或用此丸以瓊玉膏潤補之藥送之行瘀退熱全生保命所關甚大第率常者弗能用耳愚按此方乃攻擊之劑因乾血而設非虛勞常用之方若見之不真而誤投反速之斃矣獺肝散治傳尸勞瘵獺肝一具炙乾為末水服二錢每服三次以瘥為度此殺蟲之劑也紫庭方云傳尸勞瘵必有蟲須用乳香薰病人手以帛覆之良久出毛長寸許白而黃者可治紅者稍難青黑者即死若熏之良久無毛者即非此症屬尋常虛勞也又法病人吸安息煙嗽不止者乃屬傳尸不嗽者非傳也蓋虛勞熱蒸積久則生惡蟲食人臟腑同氣連枝多遭傳染甚至滅門法當補虛以復其元殺蟲以絶其根能殺其蟲雖病者不生亦可絶其傳疰金匱之於虛勞門後附獺肝散一方豈無意哉他如獺爪雄黃桃仁雷丸青蒿百部皆勞症殺蟲之品不可不考劉氏云凡童子室女不生歡笑及鰥寡僧尼情志抑鬱鬱則熱蒸久而生蟲蟲侵臟腑骨髓之中遂難療治此症初起只宜暢達情志恬淡靜養內服宣發鬱熱如逍遙散之劑不使內蒸外用桃柳頭生艾頭搗爛入麝香雄黃末拌勻烘熱擦脊骨四肢關骨之處以杜生蟲之害更用百部一斤生艾葉四兩煎湯四周密圍不使有風中生炭火一盆然後洗浴早晚洗面房中常燒玉樞丹鼻聞此氣可以殺蟲如法調治以圖萬一之僥幸凡近視此病者不宜飢餓虛者宜服補藥宜備安息及麝香則蟲鬼不敢侵也長春廣嗣丹大補真陰壯腎陽固精填髓骨筋強百齡能御青娥女此是人間第一方生地八兩萸肉六兩菟絲六兩枸杞六兩牛膝六兩杜仲六兩山藥六兩白茯苓六兩人參量加麥冬八兩天冬六兩五味六兩柏仁八兩歸身六兩骨脂六兩巴戟肉六兩肉蓯蓉八兩蓮鬚六兩覆盆子六兩沙蒺藜八兩鹿角膠一斤元武膠一斤虎骨膠一斤鰾膠一斤豬脊髓一斤黃牛肉八斤熬膏精羊肉一斤黑狗肉八斤紫河車十具驢陰莖四條狗陰莖雄蠶蛾八兩共三十二味諸膠髓丸如桐子大空心淡鹽湯飢時陳酒各送下四五錢美食壓之若肥人內多濕痰以七寶美髯丹全方用赤白首烏黑豆拌蒸曬九次各一斤赤白茯苓各八兩枸杞菟絲牛膝當歸破故紙各八兩原方故紙只四兩仍加人參蓮鬚覆盆蒺藜再入於茅朮各八兩沉香砂仁各四兩後龜鹿等藥同上異類有情丸只用後十二味加嫩鹿茸一對羊內外腎一斤干狗內外腎一斤干牡蠣半斤俱用鰾膠拌勻諸膠為丸二陰莖不用麋角霜代之亦可與古方稍異此方峻補其腎為主而兼調其五臟為佐經曰腎者主蟄封藏之本精之處也真陰之藏乃先天之本性命之根故腎之精貴欲其藏然精又化生於臟腎特受而藏之耳故五臟和而精自日生腎得補而封藏稱職所謂精盈則氣盛氣盛則神全神全則身鍵身健則無病可以長春廣嗣矣凡丈夫中年覺陽衰精薄便可服餌藥雖三十二味俱同類有情之物並無錯雜之品譬如韓侯之兵多多益善耳相火易動及陰虛內熱者切不可服服之則反生別病也按此方非為治勞而設而乃附於後者以人之致虛者由於欲故虛而火旺者既有保陰六味左歸回生之屬以治之若虛而火衰者雖不多得然此方不可不備也他如八味右歸之屬皆可隨宜選用惟無故而服此縱欲則不可若陽事短少易痿易泄精薄精寒因無子嗣者服之不惟無損且大有益潤而不燥溫而不熱較房術方一派辛熱雜霸之劑相去天淵矣治驗一人患陰虛內熱仲淳曰當用甘寒弗用苦寒非百餘劑不效用二冬滋陰清肺蘇子杷葉貝母下氣消痰桑皮瀉火骨皮鱉甲除蒸白芍五味收斂果百劑而安一婦徹夜不眠兩月飲食俱廢形體日削皆謂不治余診治之許以可救蓋此症雖屬虛幸臟腑無損心經雖有火不至灼肺況久病脈調身不發熱豈有他虞服補陰收斂之劑自然水升火降而愈用生脈散加茯棗遠志歸地大劑飲之因虛甚氣怯佐以琥珀辰砂金銀器之類約百餘劑而瘳一人患目珠痛如欲墮胸脅及背如槌碎狀晝夜咳嗽眠食俱廢自分不起仲淳令日進童便三大碗七日下黑血無數痛除嗽熱如故再投二冬桑皮童便以清肺熱蘇子橘紅杷葉貝母竹瀝以下痰氣青蒿白芍鱉甲以治肝火久之未痊病家疑其虛促用參耆仲淳不可乃自隱以黃耆二錢入藥嘗之竟夕悶熱目不交睫始固守前方兼服噙化丸不輟逾月而平蓋此病本於親喪過哀更觸惱怒肺經熱甚肝血上衝所致故不宜參耆耳一童子年十五患寒熱咳嗽面赤鼻塞夜劇家人以為傷風仲淳視之曰陰虛蓋傷風面色宜黯今反赤而明傷寒發熱必晝夜無間今只夜劇鼻塞者因火上升壅肺故鼻塞是以其陰虛也投鱉甲以除寒熱生地以補腎陰麥冬桑皮貝母沙參百部清肺降火五味收斂肺火不四劑而安一人氣喘自汗晝夜不眠不食醫以外感治之益甚仲淳曰此腎虛氣不歸原故火上浮喘汗交作脾虛故不思食亟以麥冬枸杞五味滋陰斂肺蘇子橘紅降氣消痰茯苓白芍棗仁補脾斂肺不數劑而愈一人客邸耽於青樓且多拂意之事至冬底發熱咳嗽醫皆用發表和解以外感治之神色消耗脈虛數中時復一結咳嗽有血臥不貼席余曰此陰虛症也水虧火旺故脈虛數內有瘀血故脈時一結肺肝葉損所以臥不能下症屬不治況誤認外感多服發散復蹈虛虛之戒耶不數日而沒一人形體單弱神氣衰少且素耽酒色時常齒衄春間偶患右乳旁及肩背作痛異常手不可近捫之如火日夜不眠醫用桃仁紅花乳沒靈脂延胡等藥二十餘劑不效邀余診治六脈虛數肝腎為甚余斷以陰虛火旺之症當滋陰養血扶持脾胃俾陰血漸生虛火下降則痛不求其止而止矣如必以和傷治痛為急則徒敗胃氣克削真元非所宜也疏一方付之用地芍杞子牛膝麥冬滋陰養血石斛甘草扶持脾胃桑皮續斷丹皮和調血脈囑其十劑方有效以陰無驟補之法耳服至八劑後脈氣漸和精神漸旺尚未出房室至此則能步出中堂但痛處未盡除然而生機則躍躍矣惜其欲速太過惑於群小棄置余方復以前藥雜進一月後胃氣果敗作嘔逆陰血愈耗發潮熱脾氣傷盡作腹脹再半月死矣一人患遺精聞婦人聲即泄瘠甚欲死醫告術窮仲淳之門人以遠志為君蓮鬚石蓮子為臣茯神龍齒蒺藜牡蠣為佐使丸服稍止然終不斷仲淳于前方加鰾膠一味不終劑而愈一人因肄業勞心太過患夢遺症已三四年矣不數日一發發過則虛火上炎頭面烘熱手足逆冷終夜不寐補心腎及澀精藥投之罔愈余疏一丸方以黃柏清相火為君佐以地黃枸杞萸肉天冬補腎麥冬清心蓮鬚五味澀精鰾膠填精車前利濕熱之水使相火安寧不終劑而愈病者初時恐黃柏太寒不欲用也余謂尊症之所以久而未愈者正未用此藥耳經曰腎欲堅急食苦以堅之黃柏是也腎得堅則心經雖有火而精自固何夢遺之有哉向徒用補益收澀而未及此故難取效一人病失血歲二三發其後所出漸多咳嗽發熱食減肌削屢至平康不以為意夏秋間偶發寒熱如瘧狀每夜達曙微汗始解嗣後寒熱稍減病轉下痢醫謂其虛也進以參術胸膈迷悶喉音窒塞服茯苓山藥預收紅鉛末下黑血數升胸喉頓舒面容亦轉以為得竹破竹補之法也加用桂附二劑於是下痢晝夜十數行飲食難進神識不清病轉增劇嘉言診之脾脈大而空腎脈小而亂肺脈沉而伏病者問此為何症也曰此症患在亡陰況所用峻熱之藥如權臣悍師不至犯上無等不已行期在立冬後三日以今計之不過信宿無以方為也何以言之經云暴病非陽久病非陰則數年失血其為陽盛陰虛無疑況食減而血不生漸至肌削而血日槁虛者益虛盛者益盛勢必陰火大熾上炎而傷肺金咳嗽生痰清肅下行之令盡壅由是腎水無母氣以生不足蔭養百骸柴柵瘦損每申酉時灑淅惡寒轉而熱至天明微汗始退政如夏日炎蒸非雨不解身中之象明明有春夏而無秋冬用藥之法不亟使金寒水冷以殺其勢一往不返矣乃因下利誤用參術補劑不知肺熱已久止有從皮毛透出一路今補而不宣勢必移於大腸所謂肺熱於內傳為腸澼是也至用紅鉛末下黑血者蓋陽明之血隨清氣行者久已嘔出其陰分之血隨濁氣行至胸中為募原所閉久瘀膈間得經水陰分下出之血引之而走下竅聲應氣求之妙也久積頓寬而色稍轉言笑稍適者得攻之力非得補之力也乃平日預蓄之藥必為方士所惑見為其陽大虛放膽加用桂附燥熱以盡劫其陰惜此時未得止之今則兩尺脈亂火燔而泉竭脾胃脈浮下多亡陰陽無所附肺派沉伏金氣縮斂不行神識不清而魄已先喪矣昔醫云亂世混濁有同火化夫以火濟火董曹秉權用事漢數焉能不終也一人勞心太過因食海鮮吐血有痰喉間如鯁日晡煩熱士材診之曰六脈不數惟左寸細而澀右關大而軟思慮傷心脾也以歸脾湯大劑加生地麥冬丹皮丹參二十餘劑而症減六七兼服六味丸三月遂不復發一人發熱咳嗽呼吸喘急用蘇子降氣湯不應乃服八味丸喘益急士材云兩頰俱赤六脈數大此肺肝蘊熱也以逍遙散加丹皮一兩米仁五錢蘭葉三錢連進二劑喘急頓止隨用地黃丸料以麥冬五味煎膏及龜膠為丸至十斤而安一室女年十七患瘰癧久不愈天癸未通發熱咳嗽飲食少思醫欲用巴豆肉桂之類先通其經立齊曰此症潮熱經候不調者不治今喜脈不澀不潮熱尚可治之蓋此症因稟氣不足陰血未充之故須養氣血益津液其經自行惑於速效仍服前藥立齊云非其治也此類剽悍之劑大助陽火陰血得之則妄行脾胃得之則愈虛經云女子二七而天癸至若過期不至是為非常必有所因寇宗奭云夫人之生以血氣為本人之病未有不傷血氣者世有童男室女積想在心思慮過當多致勞損在男子則神色先敗在女子則月水先閉何以致然蓋憂愁思慮則傷心心傷則逆竭故神色先敗而月水先閉也火既受病不能營養其子故不嗜食脾既虛則金氣虧故發咳嗽嗽既作水氣絶故四肢干木氣不充故多怒鬚髮焦筋骨痿俟五臟傳遍雖猝不能死然終死矣此種虛勞最難療治若能改易心志用藥扶持可得九死一生又張氏云室女經久不行切不可用苦寒以血得冷則凝也若經候微少漸漸不通手足骨內煩疼日漸羸瘦潮熱其脈微數此由陰虛血弱火盛水虧不可以毒藥通經宜常服柏子仁丸澤蘭湯一放出宮女年三十兩胯作痛肉色不變大小便中作痛如淋登廁尤甚立齊云此瘀血積入隧道為患乃男女失合之症難治後潰不斂又患瘰癧而歿此婦出宮嫁為人妾可見在宮久懷憂鬱既嫁又不能如願致生此症愈見流疰瘰癧乃七情氣血皆已損傷不可用攻其斷然矣按精血篇云精未通而御女以通其精則五臟有不滿之處異日有難狀之疾陰已痿而思色以降其精則精不出而內敗小便道澀而為淋精已耗而復竭之則大小便牽痛愈痛則愈欲便愈便則愈痛女人天癸既至逾十年無男子合則不調不調則舊血不出新血誤行或漬而入骨或變而為腫或雖合而難子合男子多則精枯虛人産多則血枯殺人觀其精血思過半矣一婦蚤孀居時年三十七患兩腿骨作痛晡時體倦月經不調或發寒熱已數年矣一日頸項兩側結核兩脅脹痛立齊云此係肝經鬱火而致用加味逍遙散加生地澤蘭等藥三十餘劑症漸輕安再用加味歸脾等藥年餘而痊一放出宮人年四十餘臀腿內股作痛晡熱口乾月經不調立齊云此係肝經血少不能營養經絡而然也用加味逍遙散加澤蘭五十餘劑諸症稍緩又以歸脾湯兼服二百餘劑而痊也一放出宮人臀腿腫痛內熱晡熱惡寒體倦咳嗽胸痞月經過期而少彼以為氣毒流疰服清熱理氣之劑益甚立齊云此肝經瘀血停留所致治法但當補其所不勝而制有所勝宜補者脾也宜制者肝也彼不信仍服前藥而斃一孀婦內熱晡熱腹脹脅痛肢體痠麻不時吐痰月經不調帶下青黃立齊云此鬱怒傷損肝脾所致朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以生肝血清肝火百餘劑而痊一婦因夫經商久出時發寒熱經行旬日方止服涼熱降火藥內熱益甚自汗盜汗月經頻數立齊云內熱汗出腎陰虛也月經頻數脾不統也用六味丸歸脾湯間服而愈一婦發熱口乾肢體倦怠腿痛膝腫月經不調立齊云此足三陰血虛之症也用六味丸逍遙散兼服兩月飲食漸進形體漸健膝腫漸消而愈一人患陰虛內熱咳嗽有痰余朝用回生丸以補腎培其根本午間臨臥用加味清寧膏以清肺理其痰嗽有時脾氣不佳間服資生丸有時內熱或甚間用保陰煎加減喜其遵守飲食宜忌及養生卻病之法年餘虛漸退熱漸除三年膏丸湯液未嘗一日間斷竟得全愈又診治患前症皆用上法全愈多人數年淹淹不死者亦多人或見吐血則用仲淳方加減治之或寒熱如瘧則用逍遙散加減治之大抵此症傷損未重內熱未甚初起加謹調治服藥毋使有間慎勿躁急求功自然悠久無疆此越人發明虛損一症優入聖域雖無方可考然其論治損之法如雲損其肺者益其氣愚謂參耆固為補氣之正藥然有肺火熾盛日久必致肺氣索然又當用潤燥清金之品清肺熱即所以救肺氣亦為益氣之本也凡用藥須活潑地如珠走盤越人所以不立方者意在斯矣損其心者調其榮衛心者血之原榮衛發動之始古方如歸脾湯乃調榮衛之法也損其脾者調其飲食適其寒溫如春夏食涼食冷秋冬食溫食熱及衣服起居各當其時是也然亦不可執定損其肝者緩其中經謂肝苦急急食甘以緩之逍遙散中用甘草緩其中之謂也損其腎者益其精凡黏膩滋濕之物皆益精之品經所謂精不足者補之以味也此治損之妙法無有過於是者矣
